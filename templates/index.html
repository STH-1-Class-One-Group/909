<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .transport{
            width:50px;
            height:30px;
        }
    </style>
</head>
<body>
    <h1>Hello world</h1>
    {% comment %}GET을 실험하기 위해 만든 곳 {% endcomment %}
    <p>팀 이름: <span class="team_name"></span></p>
    <p>팀원: <span class="team_jobs"></span></p>    

    <div>
        {% comment %} POST를 실험하기 위해 만든 곳 {% endcomment %}
        <input class="content" placeholder="입력..."></input>
        <button class="transport" onclick="sendData()">post</button>
    </div>

    <script>
        {% comment %} GET을 받아오는 곳 {% endcomment %}
        function team(){
        fetch("/get_test")
            .then(response => response.json())
            .then(data => {
                document.querySelector('.team_name').innerText = data.name;
                document.querySelector('.team_jobs').innerText = data.team.join(', ');
            }) 
    }
    {% comment %} POST을 받아오는 곳 {% endcomment %}
        function sendData(){
            const content = document.querySelector(".content").value;
            fetch("post_test", {
                method:"post",
                headers:{
                    "Content-Type": "application/json"
                },
                body:JSON.stringify({
                    "msg": content
                })
            })
            .then(response => response.json())
            .then(data => {
                document.querySelector(".team_jobs").innerText = data.message||"데이터 없음";
            })
        }
    
    team();
    </script>
</body>
</html>
