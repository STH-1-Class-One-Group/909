<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .transport{
            width:50px;
            height:30px;
        }
    </style>
</head>
<body>
    <h1>Hello world</h1>

    <p>팀 이름: <span class="team_name"></span></p>
    <p>팀원: <span class="team_jobs"></span></p>    

    <div>
        <input class="content" placeholder="입력..."></input>
        <button class="transport">post</button>
    </div>

    <script>
        function team(){
        fetch("/get_test")
            .then(response => response.json())
            .then(data => {
                document.querySelector('.team_name').innerText = data.name;
                document.querySelector('.team_jobs').innerText = data.team.join(', ');
            }) 
    }
        function post(){
            fetch("post_test")
            .then(response => response.json())
            .then()
        }
    
    team();
    </script>
</body>
</html>
