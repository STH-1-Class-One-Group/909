<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .transport{
            width:50px;
            height:30px;
        }

        .result{
            width: 300px;
            height: 300px;
            border: 1px solid;
        }
    </style>
</head>
<body>
    <h1>Hello world</h1>
    <p>팀 이름: <span class="team_name"></span></p>
    <p>팀원: <span class="team_jobs"></span></p>    

    <div>
        
        <input class="content" placeholder="입력..."></input>
        <button class="transport" onclick="sendData()">post</button>
    </div>

    <div class="result">

    </div>

    <script>

        function team(){
        fetch("/get_test")
            .then(response => response.json())
            .then(data => {
                document.querySelector('.team_name').innerText = data.name;
                document.querySelector('.team_jobs').innerText = data.team.join(', ');
            }) 
    }
        function sendData(){
            const content = document.querySelector(".content").value;

            if (content.trim() === "") {
                alert("내용을 입력하세요.");
                return; // 내용이 없으면 함수 종ㄹ료
            }

            fetch("post_test", {
                method:"post",
                headers:{
                    "Content-Type": "application/json"
                },
                body:JSON.stringify({
                    "msg": content
                })
            })
            .then(response => response.json())
            .then(data => {

                const newLog = document.createElement("p"); 
                newLog.innerText = data.message;

                document.querySelector(".result").appendChild(newLog);
                
                document.querySelector(".content").value = "";
            })
        }
    team();
        
    </script>
</body>
</html>
